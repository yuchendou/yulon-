<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YULON Intern Operating System</title>
  <style>
    /* ===== 基礎設定 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --text-dim: #888888;
      --text-bright: #ffffff;
      --cursor: #ffffff;
      --scanline: rgba(0, 0, 0, 0.12);
      --glow: rgba(255, 255, 255, 0.12);
      --font-mono: "Courier New", Courier, "Lucida Console", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scanline) 2px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 99;
    }

    #terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(12px, 3vw, 32px);
      position: relative;
      z-index: 1;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--text-dim);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-dim);
    }

    .terminal-title {
      margin-left: 8px;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: var(--text-dim);
      letter-spacing: 0.05em;
      flex: 1;
    }

    /* 階段指示器 */
    #phase-indicator {
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      color: var(--text-bright);
      text-shadow: 0 0 6px var(--glow);
      letter-spacing: 0.08em;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      line-height: 1.6;
      padding-right: 8px;
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb {
      background: var(--text-dim);
      border-radius: 3px;
    }

    .line {
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 2px;
    }

    .line.dim { color: var(--text-dim); }
    .line.bright {
      color: var(--text-bright);
      text-shadow: 0 0 8px var(--glow);
    }
    .line.error { color: #ff4444; }
    .line.prompt-line { color: var(--text); }
    .line.member-header {
      color: var(--text-bright);
      font-weight: bold;
      margin-top: 8px;
      text-shadow: 0 0 6px var(--glow);
    }
    .line.roster-line {
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .line.roster-line .idx {
      color: var(--text-bright);
    }

    .line.progress-bar {
      color: var(--text-bright);
      text-shadow: 0 0 8px var(--glow);
      letter-spacing: 0.05em;
      font-size: 1.05em;
    }

    .line.member-slot {
      color: var(--text-bright);
      letter-spacing: 0.06em;
    }

    .line.member-slot.tappable {
      cursor: pointer;
      padding: 12px 8px;
      margin: 6px 0;
      border: 1px solid var(--text-dim);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .line.member-slot.tappable:active {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-bright);
    }

    .line.mobile-back-btn {
      cursor: pointer;
      margin: 20px 0 8px;
      padding: 14px 8px;
      text-align: center;
      border: 1px dashed var(--text-dim);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .line.mobile-back-btn:active {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--text-bright);
    }

    #boot-screen.is-tappable,
    #thank-you-screen.is-tappable {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .line.member-slot.viewed {
      color: var(--text-dim);
    }

    .line.member-slot.viewed::after {
      content: "  ✓";
      color: var(--text-bright);
    }

    #progress-line {
      color: var(--text-bright);
      text-shadow: 0 0 6px var(--glow);
    }

    /* 固定進度條（選單 + 查看 profile 時始終顯示在頂部） */
    #global-progress-wrap {
      flex-shrink: 0;
      padding: 10px 0 12px;
      margin-bottom: 12px;
      border-bottom: 1px dashed var(--text-dim);
      display: none;
    }

    #global-progress-text {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--text-bright);
      text-shadow: 0 0 6px var(--glow);
      margin-bottom: 6px;
    }

    #global-progress-bar {
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
      color: var(--text-bright);
      letter-spacing: 0.06em;
      text-shadow: 0 0 8px var(--glow);
    }

    /* Thank You 全螢幕 */
    #thank-you-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 300;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(16px, 4vw, 48px);
    }

    #thank-you-content {
      max-width: 640px;
      width: 100%;
      font-size: clamp(0.95rem, 2.5vw, 1.25rem);
      line-height: 1.9;
      text-align: center;
    }

    #thank-you-hint {
      margin-top: 28px;
      color: var(--text-dim);
      animation: pulse 2s ease-in-out infinite;
      font-size: clamp(0.8rem, 2vw, 1rem);
    }

    /* Profile 照片區塊（文字左、3:4 直式照片右） */
    .profile-layout {
      display: flex;
      gap: clamp(16px, 3vw, 28px);
      align-items: flex-start;
      margin: 8px 0 12px;
    }

    .profile-text {
      flex: 1;
      min-width: 0;
    }

    .profile-photo-col {
      flex-shrink: 0;
      text-align: center;
    }

    .profile-photo-label {
      color: var(--text-dim);
      font-size: 0.75em;
      margin-bottom: 6px;
      letter-spacing: 0.12em;
    }

    /* 3:4 直式：寬 200–280px，高自動依比例（280×373） */
    .profile-photo {
      width: clamp(200px, 24vw, 280px);
      height: auto;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center;
      border: 1px solid var(--text-dim);
      box-shadow: 0 0 14px var(--glow);
      display: block;
      background: #000;
    }

    @media (max-width: 560px) {
      .profile-layout {
        flex-direction: column;
      }

      .profile-photo-col {
        align-self: center;
      }
    }

    #input-row {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--text-dim);
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
    }

    .prompt-symbol {
      color: var(--text-bright);
      margin-right: 8px;
      flex-shrink: 0;
      text-shadow: 0 0 6px var(--glow);
    }

    #command-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: inherit;
      caret-color: transparent;
    }

    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      background: var(--cursor);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--glow);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Boot 全螢幕遮罩 */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(16px, 4vw, 48px);
    }

    #boot-content {
      max-width: 700px;
      width: 100%;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      line-height: 1.8;
    }

    #boot-content .line { margin-bottom: 4px; }

    #boot-hint {
      margin-top: 24px;
      color: var(--text-dim);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* 等待 Enter 的提示列 */
    #continue-hint {
      display: none;
    }

    @media (min-width: 1400px) {
      #output, #input-row { font-size: 1.25rem; line-height: 1.7; }
    }

    @media (max-width: 768px) {
      #input-row {
        display: none !important;
      }

      #boot-hint,
      #thank-you-hint {
        font-size: clamp(0.75rem, 3.5vw, 0.95rem);
        letter-spacing: 0.06em;
        text-align: center;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>

  <!-- 階段 1：BOOT → 階段 2：CHOOSE MEMBER -->
  <div id="boot-screen">
    <div id="boot-content"></div>
    <div id="boot-hint" style="display:none;"></div>
  </div>

  <!-- CHOOSE MEMBER -->
  <div id="terminal" style="visibility:hidden;">
    <div class="terminal-header">
      <span class="terminal-dot"></span>
      <span class="terminal-dot"></span>
      <span class="terminal-dot"></span>
      <span class="terminal-title">YULON Intern Operating System v1.0</span>
      <span id="phase-indicator"></span>
    </div>

    <div id="global-progress-wrap">
      <div id="global-progress-text">Progress: 0 / 4</div>
      <div id="global-progress-bar">░░░░░░░░░░ 0%</div>
    </div>

    <div id="output"></div>

    <div id="input-row" style="display:none;">
      <span class="prompt-symbol" id="prompt-label">YIOS&gt;</span>
      <input
        type="text"
        id="command-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Terminal command input"
        disabled
      >
      <span class="cursor" id="input-cursor"></span>
    </div>
  </div>

  <!-- 四人都看完：Thank You -->
  <div id="thank-you-screen">
    <div id="thank-you-content"></div>
    <div id="thank-you-hint" style="display:none;">Press ENTER</div>
  </div>

  <script>
    /* ============================================================
       YULON Intern Operating System
       流程：1.BOOT（含載入進度條）→ 2.CHOOSE MEMBER
       成員資料集中管理 — 修改 MEMBERS 即可更新內容
       ============================================================ */

    /*
     * 成員資料說明：
     * 每位成員固定三個欄位：姓名、部門、科系
     * photo：照片路徑，留空 "" 則不顯示
     */
    const MEMBERS = {
      member1: {
        name: "吳雨臻",
        department: "資訊處",
        major: "資訊安全部",
        interest: "玩皮克敏",
        favoriteMedia: "火影忍者",
        birthYearSong: "Coldplay-yellow",
        hashtags: "#睡覺#吃飯#摸摸小狗",
        photo: "images/oliver.png"
      },
      member2: {
        name: "李知諭",
        department: "資訊營運部",
        major: "輔大醫資學程",
        interest: "看影片、佛系追星、跟小狗玩～",
        favoriteMedia: "苦盡甘來遇見你🍊",
        birthYearSong: "愛你-王心凌（2004）",
        hashtags: "#快樂冒險家 #哪裡有活動哪裡就有我 #世界這麼大我都要看過一遍！",
        photo: "images/member2.png"
      },
      member3: {
        name: "李東璟",
        department: "人力資源部",
        major: "師大科技應用與人資系",
        interest: "旅遊、鐵道、攝影、看海&夕陽",
        favoriteMedia: "我的少女時代",
        birthYearSong: "寧夏-梁靜茹（2004）",
        hashtags: "#鄉下小孩 #笑點很低 #沒有要當老師",
        photo: "images/member3.png"
      },
      member4: {
        name: "劉應侑",
        department: "數位發展部",
        major: "中央財金所",
        interest: "足球、研究台股、打遊戲",
        favoriteMedia: "楚門的世界",
        birthYearSong: "太聰明-陳綺貞（2002）",
        hashtags: "#阿根廷世界冠軍 🇦🇷\n#多頭的終點台股十萬點😍\n#要每天早睡早起",
        photo: "images/member4.png"
      }
    };

    // Profile 固定三欄位
    const PROFILE_FIELDS = [
      { key: "name", label: "姓名" },
      { key: "department", label: "部門" },
      { key: "major", label: "科系" },
      { key: "interest", label: "興趣" },
      { key: "favoriteMedia", label: "喜歡的電影或電視劇" },
      { key: "birthYearSong", label: "我出生那年的歌曲" },
      { key: "hashtags", label: "給自己三個" }
    ];

    /* ===== 流程階段 ===== */
    const PHASE = {
      BOOTING: "booting",
      CHOOSE: "choose"
    };

    /* ===== DOM ===== */
    const bootScreen = document.getElementById("boot-screen");
    const bootContent = document.getElementById("boot-content");
    const bootHint = document.getElementById("boot-hint");
    const terminal = document.getElementById("terminal");
    const output = document.getElementById("output");
    const phaseIndicator = document.getElementById("phase-indicator");
    const inputRow = document.getElementById("input-row");
    const commandInput = document.getElementById("command-input");
    const globalProgressWrap = document.getElementById("global-progress-wrap");
    const globalProgressText = document.getElementById("global-progress-text");
    const globalProgressBar = document.getElementById("global-progress-bar");
    const thankYouScreen = document.getElementById("thank-you-screen");
    const thankYouContent = document.getElementById("thank-you-content");
    const thankYouHint = document.getElementById("thank-you-hint");

    /* ===== 狀態 ===== */
    let currentPhase = PHASE.BOOTING;
    let isTyping = false;
    let bootReady = false;
    let thankYouReady = false;
    let thankYouShown = false;
    let bootTransitioning = false;
    let viewedProfiles = new Set();
    let progressEl = null;
    let memberSlotEls = [];

    const TYPING_SPEED = 28;       // 一般速度（CHOOSE / profile）
    const LINE_DELAY = 120;
    const FAST_TYPING_SPEED = 6;   // BOOT / CHOOSE 列表較快
    const FAST_LINE_DELAY = 30;

    const MEMBER_KEYS = ["member1", "member2", "member3", "member4"];
    const TOTAL_MEMBERS = MEMBER_KEYS.length;

    // 手機 / 觸控裝置判斷
    const isMobile =
      window.matchMedia("(max-width: 768px), (pointer: coarse)").matches ||
      "ontouchstart" in window;

    const HINT_CONTINUE = isMobile
      ? "TAP ANYWHERE TO CONTINUE"
      : "Press ENTER";

    /* ===== 工具函式 ===== */
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function scrollToBottom() {
      output.scrollTop = output.scrollHeight;
    }

    function setPhaseIndicator(label) {
      phaseIndicator.textContent = label;
    }

    function showInputRow(show) {
      if (isMobile) {
        inputRow.style.display = "none";
        return;
      }
      inputRow.style.display = show ? "flex" : "none";
    }

    function setupContinueHints() {
      bootHint.textContent = HINT_CONTINUE;
      thankYouHint.textContent = HINT_CONTINUE;
    }

    /** 手機模式：隱藏鍵盤輸入，全程用點擊操作 */
    function setupMobileMode() {
      if (!isMobile) return;
      commandInput.setAttribute("readonly", "true");
      commandInput.setAttribute("inputmode", "none");
      commandInput.setAttribute("tabindex", "-1");
      commandInput.blur();
    }

    function showGlobalProgress(show) {
      globalProgressWrap.style.display = show ? "block" : "none";
    }

    /** 產生進度條文字：████████░░ 80% */
    function buildProgressView(count, total = TOTAL_MEMBERS) {
      const pct = Math.round((count / total) * 100);
      const filled = Math.round((count / total) * 10);
      const bar = "█".repeat(filled) + "░".repeat(10 - filled);
      return {
        label: `Progress: ${count} / ${total}`,
        bar: `${bar} ${pct}%`
      };
    }

    /** 更新所有進度顯示（頂部固定條 + 選單內文字） */
    function updateProgressDisplay() {
      const { label, bar } = buildProgressView(viewedProfiles.size);

      globalProgressText.textContent = label;
      globalProgressBar.textContent = bar;

      if (progressEl) {
        progressEl.textContent = `${label}  ${bar}`;
      }

      memberSlotEls.forEach((el, i) => {
        const key = MEMBER_KEYS[i];
        el.classList.toggle("viewed", viewedProfiles.has(key));
      });
    }

    /* ===== 打字動畫 ===== */
    async function typeText(text, className = "line", speed = TYPING_SPEED, container = output) {
      const lineEl = document.createElement("div");
      lineEl.className = `typing-line ${className}`;
      container.appendChild(lineEl);
      scrollToBottom();

      for (let i = 0; i < text.length; i++) {
        lineEl.textContent = text.slice(0, i + 1);
        scrollToBottom();
        await delay(speed);
      }

      lineEl.className = className;
      return lineEl;
    }

    async function typeLines(lines, className = "line", speed = TYPING_SPEED, lineDelay = LINE_DELAY, container = output) {
      isTyping = true;
      for (const line of lines) {
        if (line === "") {
          const emptyEl = document.createElement("div");
          emptyEl.className = className;
          emptyEl.innerHTML = "&nbsp;";
          container.appendChild(emptyEl);
          scrollToBottom();
          await delay(lineDelay);
        } else {
          await typeText(line, className, speed, container);
          await delay(lineDelay);
        }
      }
      isTyping = false;
    }

    function appendPromptLine(command) {
      const lineEl = document.createElement("div");
      lineEl.className = "line prompt-line";
      lineEl.textContent = `YIOS> ${command}`;
      output.appendChild(lineEl);
      scrollToBottom();
    }

    function clearOutput() {
      output.innerHTML = "";
    }

    /** Boot 畫面打字（輸出到 bootContent） */
    async function typeBootLine(text, className = "line bright") {
      const lineEl = document.createElement("div");
      lineEl.className = `typing-line ${className}`;
      bootContent.appendChild(lineEl);

      for (let i = 0; i < text.length; i++) {
        lineEl.textContent = text.slice(0, i + 1);
        await delay(FAST_TYPING_SPEED);
      }

      lineEl.className = className;
      return lineEl;
    }

    /** Boot 載入進度條動畫：██████████ 100% */
    async function animateBootProgress() {
      const lineEl = document.createElement("div");
      lineEl.className = "line progress-bar";
      bootContent.appendChild(lineEl);

      const total = 10;
      for (let i = 0; i <= total; i++) {
        const filled = "█".repeat(i);
        const empty = "░".repeat(total - i);
        const pct = i * 10;
        lineEl.textContent = `${filled}${empty} ${pct}%`;
        await delay(70);
      }

      return lineEl;
    }

    /** 依 MEMBERS 內有填的欄位組出 profile 文字行 */
    function buildProfileLines(m) {
      return PROFILE_FIELDS
        .filter(({ key }) => m[key])
        .map(({ key, label }) => `${label}：${m[key]}`);
    }

    /** 建立 profile 版面：左側文字、右側 3:4 照片 */
    function createProfileLayout(m) {
      const layout = document.createElement("div");
      layout.className = "profile-layout";

      const textCol = document.createElement("div");
      textCol.className = "profile-text";
      layout.appendChild(textCol);

      if (m.photo) {
        const photoCol = document.createElement("div");
        photoCol.className = "profile-photo-col";

        const label = document.createElement("div");
        label.className = "profile-photo-label";
        label.textContent = "[ PHOTO LOADED ]";

        const img = document.createElement("img");
        img.className = "profile-photo";
        img.src = m.photo;
        img.alt = m.name + " profile photo";

        photoCol.appendChild(label);
        photoCol.appendChild(img);
        layout.appendChild(photoCol);
      }

      output.appendChild(layout);
      scrollToBottom();
      return textCol;
    }

    /* ============================================================
       階段 1：BOOT（合併原 Boot + Welcome）
       ============================================================ */
    async function runBootSequence() {
      await typeBootLine("Booting YIOS...");
      await delay(FAST_LINE_DELAY);
      await typeBootLine("Loading database...");
      await delay(FAST_LINE_DELAY * 1.5);

      await animateBootProgress();
      await delay(FAST_LINE_DELAY);

      const emptyEl = document.createElement("div");
      emptyEl.className = "line";
      emptyEl.innerHTML = "&nbsp;";
      bootContent.appendChild(emptyEl);

      await typeBootLine("4 Intern Profiles Loaded.");
      await delay(FAST_LINE_DELAY);
      await typeBootLine("Access Granted.", "line bright");
      await delay(FAST_LINE_DELAY);

      bootHint.style.display = "block";
      bootScreen.classList.add("is-tappable");
      bootReady = true;
    }

    async function finishBooting() {
      if (!bootReady || currentPhase !== PHASE.BOOTING || bootTransitioning) return;
      bootTransitioning = true;
      bootReady = false;
      bootScreen.classList.remove("is-tappable");

      bootScreen.style.opacity = "0";
      bootScreen.style.transition = "opacity 0.5s ease";
      await delay(500);
      bootScreen.style.display = "none";

      terminal.style.visibility = "visible";
      currentPhase = PHASE.CHOOSE;
      await runChoosePhase();
      bootTransitioning = false;
    }

    /* ============================================================
       階段 2：CHOOSE MEMBER
       ============================================================ */
    async function runChoosePhase() {
      setPhaseIndicator("[ CHOOSE PROFILE ]");
      showGlobalProgress(true);
      updateProgressDisplay();
      clearOutput();
      memberSlotEls = [];

      await typeLines([
        "Choose a profile.",
        ""
      ], "line bright", FAST_TYPING_SPEED, FAST_LINE_DELAY);

      // Progress 行（之後會動態更新）
      progressEl = document.createElement("div");
      progressEl.id = "progress-line";
      progressEl.className = "line bright";
      const pv = buildProgressView(viewedProfiles.size);
      progressEl.textContent = `${pv.label}  ${pv.bar}`;
      output.appendChild(progressEl);
      scrollToBottom();
      await delay(FAST_LINE_DELAY);

      const emptyEl = document.createElement("div");
      emptyEl.className = "line";
      emptyEl.innerHTML = "&nbsp;";
      output.appendChild(emptyEl);

      // 成員選項列表（顯示編號 + 姓名；手機可點擊）
      for (let i = 0; i < MEMBER_KEYS.length; i++) {
        const m = MEMBERS[MEMBER_KEYS[i]];
        const num = String(i + 1).padStart(2, "0");
        const slotEl = document.createElement("div");
        slotEl.className = "line member-slot";
        if (viewedProfiles.has(MEMBER_KEYS[i])) slotEl.classList.add("viewed");
        slotEl.textContent = `[ Member ${num} ]  ${m.name}`;
        if (isMobile) bindMemberSlot(slotEl, i);
        output.appendChild(slotEl);
        memberSlotEls.push(slotEl);
        scrollToBottom();
        await delay(FAST_LINE_DELAY * 0.6);
      }

      await typeLines([
        "",
        isMobile
          ? "Tap a member above to view profile."
          : "Enter 1, 2, 3, or 4 to view profile.",
        ""
      ], "line dim", FAST_TYPING_SPEED, FAST_LINE_DELAY);

      showInputRow(true);
      if (!isMobile) {
        commandInput.disabled = false;
        commandInput.value = "";
        commandInput.focus();
      }
    }

    /** 手機版：綁定成員列點擊 */
    function bindMemberSlot(slotEl, index) {
      slotEl.classList.add("tappable");
      slotEl.setAttribute("role", "button");
      slotEl.setAttribute("tabindex", "0");

      const activate = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (currentPhase !== PHASE.CHOOSE || isTyping || thankYouReady) return;
        await openMemberProfile(MEMBER_KEYS[index], String(index + 1));
      };

      slotEl.addEventListener("click", activate);
      slotEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") activate(e);
      });
    }

    /** 手機版：profile 下方返回選單按鈕 */
    function appendMobileBackButton() {
      if (!isMobile) return;

      const btn = document.createElement("div");
      btn.className = "line mobile-back-btn bright";
      btn.textContent = "[ ← Back to menu ]";
      btn.setAttribute("role", "button");
      btn.setAttribute("tabindex", "0");

      const goBack = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (isTyping || thankYouReady) return;
        await runChoosePhase();
      };

      btn.addEventListener("click", goBack);
      btn.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") goBack(e);
      });

      output.appendChild(btn);
      scrollToBottom();
    }

    /** 開啟成員 profile（點擊共用；鍵盤由 handleChooseInput 處理） */
    async function openMemberProfile(key, inputLabel) {
      if (isTyping || thankYouReady) return;

      appendPromptLine(inputLabel);
      commandInput.disabled = true;
      await showMemberProfile(key);

      if (!thankYouReady) {
        commandInput.disabled = false;
        commandInput.value = "";
        if (!isMobile) commandInput.focus();
      }
    }

    /**
     * 顯示成員完整資料
     * @param {string} key - MEMBERS 的 key，例如 member1
     */
    async function showMemberProfile(key) {
      const m = MEMBERS[key];
      if (!m) return;

      commandInput.disabled = true;

      const wasComplete = viewedProfiles.size >= 4;
      viewedProfiles.add(key);
      updateProgressDisplay();

      const profileLines = buildProfileLines(m);
      const textCol = createProfileLayout(m);
      const pv = buildProgressView(viewedProfiles.size);

      await typeLines([
        "",
        `${pv.label}  ${pv.bar}`,
        "",
        `── ${m.name} ──`,
        "",
        ...profileLines,
        "",
        isMobile
          ? "Tap [← Back to menu] below or select another member."
          : "Enter another number (1-4) or type \"back\" to menu."
      ], "line", TYPING_SPEED, LINE_DELAY, textCol);

      appendMobileBackButton();

      if (!wasComplete && viewedProfiles.size >= 4) {
        await maybeShowThankYou();
      }

      if (!thankYouReady) {
        commandInput.disabled = false;
        commandInput.value = "";
        if (!isMobile) commandInput.focus();
      }
    }

    /**
     * 解析使用者輸入，回傳 member key 或特殊指令
     */
    function parseMemberInput(raw) {
      const input = raw.trim().toLowerCase();

      if (input === "back" || input === "menu") return "back";

      const numMap = { "1": "member1", "2": "member2", "3": "member3", "4": "member4" };
      if (numMap[input]) return numMap[input];

      if (MEMBERS[input]) return input;

      return null;
    }

    /** 四人都看完後顯示 Thank You */
    async function maybeShowThankYou() {
      if (thankYouShown || viewedProfiles.size < 4) return;
      thankYouShown = true;
      thankYouReady = false;

      await delay(400);
      commandInput.disabled = true;
      thankYouScreen.style.display = "flex";
      thankYouContent.innerHTML = "";

      const lines = [
        "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━",
        "",
        "  ALL PROFILES COMPLETE.",
        "",
        "  Thank you for meeting our team!",
        "",
        "  We are four interns ready to learn,",
        "  collaborate, and create value at YULON.",
        "",
        "  See you soon. :)",
        "",
        "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      ];

      for (const line of lines) {
        if (line === "") {
          const emptyEl = document.createElement("div");
          emptyEl.className = "line bright";
          emptyEl.innerHTML = "&nbsp;";
          thankYouContent.appendChild(emptyEl);
        } else {
          const lineEl = document.createElement("div");
          lineEl.className = "typing-line line bright";
          thankYouContent.appendChild(lineEl);
          for (let i = 0; i < line.length; i++) {
            lineEl.textContent = line.slice(0, i + 1);
            await delay(FAST_TYPING_SPEED);
          }
          lineEl.className = "line bright";
        }
        await delay(FAST_LINE_DELAY * 0.8);
      }

      thankYouHint.style.display = "block";
      thankYouScreen.classList.add("is-tappable");
      thankYouReady = true;
    }

    async function dismissThankYou() {
      if (!thankYouReady) return;
      thankYouReady = false;
      thankYouScreen.classList.remove("is-tappable");
      thankYouScreen.style.opacity = "0";
      thankYouScreen.style.transition = "opacity 0.5s ease";
      await delay(500);
      thankYouScreen.style.display = "none";
      thankYouScreen.style.opacity = "1";
      thankYouHint.style.display = "none";
      commandInput.disabled = false;
      if (!isMobile) commandInput.focus();
    }

    async function handleChooseInput(raw) {
      const input = raw.trim();
      if (!input || isTyping || thankYouReady) return;

      appendPromptLine(input);
      commandInput.disabled = true;

      const result = parseMemberInput(input);

      if (result === "back") {
        await runChoosePhase();
        return;
      }

      if (result) {
        await showMemberProfile(result);
        if (!thankYouReady) {
          commandInput.disabled = false;
          commandInput.value = "";
          if (!isMobile) commandInput.focus();
        }
        return;
      }

      await typeLines([
        "Invalid selection.",
        isMobile
          ? "Tap a member from the menu above."
          : "Please enter 1, 2, 3, 4, or \"back\"."
      ], "line error");

      commandInput.disabled = false;
      commandInput.value = "";
      if (!isMobile) commandInput.focus();
    }

    /* ===== 事件監聽 ===== */

    setupContinueHints();
    setupMobileMode();

    // Boot / Thank You：Enter（桌面）或點擊任意處（手機）
    bootScreen.addEventListener("click", async () => {
      if (bootReady && currentPhase === PHASE.BOOTING && !isTyping) {
        await finishBooting();
      }
    });

    thankYouScreen.addEventListener("click", async () => {
      if (thankYouReady) await dismissThankYou();
    });

    document.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter" || isTyping) return;

      if (thankYouReady) {
        e.preventDefault();
        await dismissThankYou();
        return;
      }

      if (currentPhase === PHASE.BOOTING && bootReady) {
        e.preventDefault();
        await finishBooting();
      }
    });

    // Choose 階段：Enter 執行選擇（桌面）
    commandInput.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && currentPhase === PHASE.CHOOSE && !isTyping && !isMobile) {
        e.preventDefault();
        await handleChooseInput(commandInput.value);
      }
    });

    if (!isMobile) {
      terminal.addEventListener("click", () => {
        if (currentPhase === PHASE.CHOOSE && !commandInput.disabled) {
          commandInput.focus();
        }
      });
    }

    commandInput.addEventListener("input", () => {
      if (isTyping) commandInput.value = commandInput.value.slice(0, -1);
    });

    /* ===== 啟動 ===== */
    runBootSequence();
  </script>
</body>
</html>
